services:
  app:
    build:
      context: .
    container_name: vocal-metrics-app
    restart: unless-stopped
    expose:
      - "8501"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SECRET_NAME: ${DB_SECRET_NAME}
      AWS_REGION: ${AWS_REGION}

  nginx:
    image: nginx:stable-alpine
    container_name: vocal-metrics-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
